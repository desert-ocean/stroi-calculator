<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор цемента онлайн</title>
  <meta name="description" content="Калькулятор цемента онлайн: рассчитайте количество цемента по объёму и доле в растворе.">
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Калькулятор цемента онлайн</h1>
      <form id="calc-form" data-type="cement" onsubmit="event.preventDefault(); calc();">
        <div class="form-grid">
          <div><label for="volume">Объём раствора (м³)</label><input id="volume" type="number" step="0.01"></div>
          <div><label for="ratio">Доля цемента (0.2, 0.25...)</label><input id="ratio" type="number" step="0.01" value="0.25"></div>
        </div>
        <button type="submit">Рассчитать</button>
      </form>
      <h2 id="result">Результат появится здесь.</h2>
    </section>

    <section class="card">
      <h2>Как считается</h2>
      <p>Формула: объём × 1400 × доля цемента. Плотность цемента для упрощённого расчёта принята 1400 кг/м³, итог округляется вверх.</p>
    </section>

    <section class="card">
      <h2>Смотрите также</h2>
      <ul class="also-list">
        <li><a href="beton.html">Калькулятор бетона</a></li>
        <li><a href="kirpich.html">Калькулятор кирпича</a></li>
        <li><a href="shtukaturka.html">Калькулятор штукатурки</a></li>
      </ul>
    </section>
  </main>
  <script src="../assets/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Калькулятор цемента</title>
</head>
<body>

<h1>Калькулятор цемента для раствора</h1>

<label>Объём раствора (м³)</label>
<input type="number" id="volume">

<label>Доля цемента (%)</label>
<input type="number" id="ratio" value="30">

<button onclick="calc()">Рассчитать</button>

<h2 id="result"></h2>

<script>
function calc() {
    let v = parseFloat(document.getElementById("volume").value);
    let r = parseFloat(document.getElementById("ratio").value);

    let cementKg = v * (r / 100) * 1400;

    document.getElementById("result").innerText =
        "Нужно цемента: " + Math.ceil(cementKg) + " кг";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Калькулятор бетона</title>
</head>
<body>

<h1>Калькулятор бетона</h1>

<label>Объём бетона (м³)</label>
<input type="number" id="volume">

<label>Марка (пример: 300)</label>
<input type="number" id="mark" value="300">

<button onclick="calc()">Рассчитать</button>

<h2 id="result"></h2>

<script>
function calc() {
    let v = parseFloat(document.getElementById("volume").value);
    let m = parseFloat(document.getElementById("mark").value);

    // упрощённая формула (для MVP)
    let cementKg = v * m * 1.2;

    document.getElementById("result").innerText =
        "Цемент: " + Math.ceil(cementKg) + " кг (примерный расчет)";
}
</script>

</body>
</html>

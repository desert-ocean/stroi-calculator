<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор бетона онлайн</title>
  <meta name="description" content="Калькулятор бетона онлайн: быстрый расчёт сухой смеси для заливки.">
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Калькулятор бетона онлайн</h1>
      <form id="calc-form" data-type="beton" onsubmit="event.preventDefault(); calc();">
        <div class="form-grid">
          <div><label for="volume">Объём бетона (м³)</label><input id="volume" type="number" step="0.01"></div>
          <div><label for="reserve">Запас (%)</label><input id="reserve" type="number" step="1" value="0"></div>
        </div>
        <button type="submit">Рассчитать</button>
      </form>
      <h2 id="result">Результат появится здесь.</h2>
    </section>

    <section class="card">
      <h2>Как считается</h2>
      <p>Базовая формула: объём × 300. Это ориентировочный расход сухой смеси в килограммах для стандартной задачи. Результат округляется вверх.</p>
    </section>

    <section class="card">
      <h2>Смотрите также</h2>
      <ul class="also-list">
        <li><a href="cement.html">Калькулятор цемента</a></li>
        <li><a href="pol.html">Калькулятор пола</a></li>
        <li><a href="doski.html">Калькулятор досок</a></li>
      </ul>
    </section>
  </main>
  <script src="../assets/script.js"></script>
</body>
</html>

<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}">
  {{ROBOTS_META}}
  {{CANONICAL}}
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>{{H1}}</h1>
      <p>{{INTRO}}</p>
      <p>{{TASK}}</p>
    </section>

    {{DYNAMIC_BLOCKS}}

    <section class="card">
      <h2>Изменить параметры</h2>
      {{FORM}}
      <h2 id="result">{{LIVE_RESULT}}</h2>
      <p><a href="{{CALCULATOR_URL}}">Открыть основной калькулятор</a></p>
    </section>

    <section class="card">
      <h2>Похожие расчёты</h2>
      <ul class="also-list">
        {{RELATED_PAGES}}
      </ul>
    </section>

    <section class="card">
      <h2>Полезные калькуляторы</h2>
      <ul class="also-list">
        {{RELATED_CALCULATORS}}
      </ul>
      <p><a href="index.html">Все готовые расчёты</a></p>
      <p><a href="../index.html">На главную</a></p>
    </section>
  </main>
  <script src="../assets/script.js"></script>
</body>
</html>
